<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ 天地图 - 豪华定位地图</title>
    <style>
        :root {
            --bg: #0a0e17;
            --panel-bg: rgba(16, 20, 30, 0.85);
            --panel-border: rgba(255, 255, 255, 0.12);
            --text-primary: #e8ecf1;
            --text-secondary: #b0b8c4;
            --accent: #4da8ff;
            --accent-glow: #4da8ff;
            --accent2: #7c5cfc;
            --accent3: #00d4aa;
            --danger: #ff5263;
            --gold: #f0c060;
            --glass-blur: 18px;
            --radius-lg: 20px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --shadow-glow: 0 0 60px rgba(77, 168, 255, 0.18);
            --shadow-card: 0 8px 40px rgba(0, 0, 0, 0.45);
            --shadow-elevated: 0 16px 60px rgba(0, 0, 0, 0.55);
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --transition-bounce: 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            font-family: 'SF Pro Display', 'PingFang SC', 'Helvetica Neue', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            user-select: none;
            -webkit-user-select: none;
            -webkit-tap-highlight-color: transparent;
            cursor: default;
        }

        /* ==================== 地图容器 ==================== */
        #mapContainer {
            position: fixed;
            inset: 0;
            z-index: 1;
        }

        /* 天地图水印适化 */
        #mapContainer .tdt-watermark,
        #mapContainer .tdt-copyright {
            opacity: 0.5;
            transition: opacity 0.3s;
        }

        /* ==================== 脉冲定位标记层 ==================== */
        #pulseLayer {
            position: fixed;
            inset: 0;
            z-index: 2;
            pointer-events: none;
        }
        .pulse-marker {
            position: absolute;
            pointer-events: none;
            transform: translate(-50%, -50%);
            z-index: 10;
        }
        .pulse-marker .pulse-core {
            position: absolute;
            width: 18px;
            height: 18px;
            background: #fff;
            border-radius: 50%;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            box-shadow:
                0 0 10px #fff,
                0 0 25px var(--accent-glow),
                0 0 50px var(--accent-glow),
                0 0 80px rgba(77, 168, 255, 0.6);
            z-index: 3;
            animation: corePulse 1.6s ease-in-out infinite;
        }
        .pulse-marker .pulse-ring {
            position: absolute;
            border-radius: 50%;
            border: 2.5px solid rgba(77, 168, 255, 0.8);
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: ringExpand 2s ease-out infinite;
            z-index: 2;
        }
        .pulse-marker .pulse-ring:nth-child(2) {
            animation-delay: 0.5s;
            border-color: rgba(77, 168, 255, 0.55);
        }
        .pulse-marker .pulse-ring:nth-child(3) {
            animation-delay: 1s;
            border-color: rgba(124, 92, 252, 0.45);
        }
        .pulse-marker .pulse-ring:nth-child(4) {
            animation-delay: 1.5s;
            border-color: rgba(0, 212, 170, 0.35);
        }

        @keyframes corePulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                box-shadow: 0 0 10px #fff, 0 0 25px var(--accent-glow), 0 0 50px var(--accent-glow), 0 0 80px rgba(77, 168, 255, 0.6);
            }
            50% {
                transform: translate(-50%, -50%) scale(1.25);
                box-shadow: 0 0 16px #fff, 0 0 40px var(--accent-glow), 0 0 70px var(--accent-glow), 0 0 110px rgba(77, 168, 255, 0.85);
            }
        }
        @keyframes ringExpand {
            0% {
                width: 12px;
                height: 12px;
                opacity: 1;
            }
            100% {
                width: 180px;
                height: 180px;
                opacity: 0;
            }
        }

        /* ==================== 顶部状态栏 ==================== */
        #topBar {
            position: fixed;
            top: 16px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 18px;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--panel-border);
            border-radius: 50px;
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
        }
        #topBar .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #00d46a;
            box-shadow: 0 0 10px #00d46a;
            animation: statusGlow 2s ease-in-out infinite;
            flex-shrink: 0;
        }
        @keyframes statusGlow {
            0%,
            100% {
                box-shadow: 0 0 8px #00d46a;
            }
            50% {
                box-shadow: 0 0 20px #00d46a, 0 0 35px rgba(0, 212, 106, 0.5);
            }
        }
        #topBar .status-dot.locating {
            background: #f0a040;
            box-shadow: 0 0 12px #f0a040;
            animation: statusGlowOrange 0.8s ease-in-out infinite;
        }
        @keyframes statusGlowOrange {
            0%,
            100% {
                box-shadow: 0 0 8px #f0a040;
            }
            50% {
                box-shadow: 0 0 22px #f0a040, 0 0 38px rgba(240, 160, 64, 0.5);
            }
        }
        #topBar .status-dot.error {
            background: #ff5263;
            box-shadow: 0 0 10px #ff5263;
            animation: statusGlowRed 1s ease-in-out infinite;
        }
        @keyframes statusGlowRed {
            0%,
            100% {
                box-shadow: 0 0 6px #ff5263;
            }
            50% {
                box-shadow: 0 0 18px #ff5263, 0 0 30px rgba(255, 82, 99, 0.5);
            }
        }
        #topBar .topbar-text {
            font-size: 13px;
            font-weight: 500;
            color: var(--text-primary);
            white-space: nowrap;
            letter-spacing: 0.3px;
        }
        #topBar .topbar-divider {
            width: 1px;
            height: 14px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 1px;
            flex-shrink: 0;
        }
        #topBar .topbar-time {
            font-size: 13px;
            font-weight: 600;
            color: var(--accent3);
            font-variant-numeric: tabular-nums;
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', 'PingFang SC', monospace;
            letter-spacing: 0.5px;
        }

        /* ==================== 左侧信息面板 ==================== */
        #infoPanel {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 20;
            width: 310px;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--panel-border);
            border-radius: var(--radius-lg);
            padding: 22px 20px;
            box-shadow: var(--shadow-elevated), var(--shadow-glow);
            transition: all var(--transition-smooth);
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        #infoPanel:hover {
            border-color: rgba(255, 255, 255, 0.22);
            box-shadow: var(--shadow-elevated), 0 0 80px rgba(77, 168, 255, 0.25);
        }
        #infoPanel .panel-header {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        #infoPanel .panel-icon {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
            box-shadow: 0 4px 16px rgba(77, 168, 255, 0.35);
        }
        #infoPanel .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.4px;
        }
        #infoPanel .panel-subtitle {
            font-size: 11px;
            color: var(--text-secondary);
            letter-spacing: 0.3px;
            font-weight: 400;
        }
        #infoPanel .info-row {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 10px 12px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: var(--radius-sm);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: var(--transition-smooth);
            cursor: default;
        }
        #infoPanel .info-row:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 255, 255, 0.12);
        }
        #infoPanel .info-row .info-icon {
            font-size: 16px;
            flex-shrink: 0;
            margin-top: 1px;
        }
        #infoPanel .info-row .info-content {
            flex: 1;
            min-width: 0;
        }
        #infoPanel .info-row .info-label {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            color: var(--text-secondary);
            margin-bottom: 3px;
        }
        #infoPanel .info-row .info-value {
            font-size: 13.5px;
            font-weight: 500;
            color: var(--text-primary);
            word-break: break-all;
            line-height: 1.4;
        }
        #infoPanel .info-row .info-value.coords {
            font-family: 'SF Mono', 'JetBrains Mono', 'Consolas', monospace;
            font-size: 12px;
            color: var(--accent3);
            letter-spacing: 0.3px;
        }
        #infoPanel .info-row .info-value.address {
            color: #e0d8c8;
            font-weight: 400;
        }

        /* ==================== 底部操作栏 ==================== */
        #bottomBar {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            display: flex;
            gap: 10px;
            padding: 8px 10px;
            background: var(--panel-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--panel-border);
            border-radius: 50px;
            box-shadow: var(--shadow-card);
            transition: var(--transition-smooth);
        }
        #bottomBar button {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-primary);
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            position: relative;
            outline: none;
            -webkit-tap-highlight-color: transparent;
        }
        #bottomBar button:hover {
            background: rgba(255, 255, 255, 0.13);
            border-color: rgba(255, 255, 255, 0.35);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transform: translateY(-2px);
        }
        #bottomBar button:active {
            transform: scale(0.94);
            transition: 0.1s ease;
        }
        #bottomBar button.active-btn {
            background: rgba(77, 168, 255, 0.25);
            border-color: var(--accent);
            box-shadow: 0 0 18px rgba(77, 168, 255, 0.3);
            color: #fff;
        }
        #bottomBar button .tooltip-hint {
            position: absolute;
            bottom: 110%;
            left: 50%;
            transform: translateX(-50%) translateY(6px);
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            font-size: 11px;
            padding: 5px 10px;
            border-radius: 20px;
            white-space: nowrap;
            pointer-events: none;
            opacity: 0;
            transition: all 0.25s ease;
            letter-spacing: 0.3px;
            font-weight: 500;
        }
        #bottomBar button:hover .tooltip-hint {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ==================== 缩放信息标签 ==================== */
        #zoomLabel {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            background: rgba(0, 0, 0, 0.5);
            padding: 4px 12px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            pointer-events: none;
            transition: opacity 0.4s;
            opacity: 0.7;
        }

        /* ==================== Toast 提示 ==================== */
        #toast {
            position: fixed;
            top: 100px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            z-index: 100;
            padding: 12px 22px;
            border-radius: 50px;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.3px;
            pointer-events: none;
            opacity: 0;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
        #toast.success {
            border-color: rgba(0, 212, 106, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 212, 106, 0.2);
        }
        #toast.warning {
            border-color: rgba(240, 160, 64, 0.5);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5), 0 0 30px rgba(240, 160, 64, 0.2);
        }

        /* ==================== 加载画面 ==================== */
        #loadingOverlay {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
            opacity: 1;
            visibility: visible;
        }
        #loadingOverlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        #loadingOverlay .loader-ring {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: var(--accent);
            animation: spin 0.9s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        #loadingOverlay .loader-text {
            color: var(--text-primary);
            font-size: 15px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }
        #loadingOverlay .loader-sub {
            color: var(--text-secondary);
            font-size: 12px;
            margin-top: 6px;
            letter-spacing: 0.3px;
        }

        /* ==================== 响应式 ==================== */
        @media (max-width: 768px) {
            #infoPanel {
                left: 8px;
                right: 8px;
                top: auto;
                bottom: 100px;
                transform: none;
                width: auto;
                max-width: 100%;
                border-radius: var(--radius-lg) var(--radius-lg) 0 0;
                padding: 16px 14px;
                gap: 8px;
                border-bottom: none;
            }
            #infoPanel .panel-header {
                gap: 8px;
            }
            #infoPanel .panel-icon {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
            #infoPanel .panel-title {
                font-size: 13px;
            }
            #infoPanel .info-row {
                padding: 7px 10px;
                gap: 7px;
            }
            #infoPanel .info-row .info-value {
                font-size: 12px;
            }
            #infoPanel .info-row .info-value.coords {
                font-size: 10.5px;
            }
            #topBar {
                top: 10px;
                padding: 8px 14px;
                gap: 7px;
            }
            #topBar .topbar-text {
                font-size: 11px;
            }
            #topBar .topbar-time {
                font-size: 11px;
            }
            #bottomBar {
                bottom: 10px;
                gap: 6px;
                padding: 6px 8px;
            }
            #bottomBar button {
                width: 36px;
                height: 36px;
                font-size: 15px;
            }
            #zoomLabel {
                bottom: 75px;
                font-size: 10px;
            }
            .pulse-marker .pulse-ring {
                animation: ringExpandSmall 2s ease-out infinite;
            }
            @keyframes ringExpandSmall {
                0% {
                    width: 10px;
                    height: 10px;
                    opacity: 1;
                }
                100% {
                    width: 100px;
                    height: 100px;
                    opacity: 0;
                }
            }
        }

        @media (max-width: 400px) {
            #infoPanel {
                bottom: 85px;
                padding: 12px 10px;
                border-radius: 16px 16px 0 0;
            }
            #topBar {
                top: 6px;
                padding: 6px 10px;
                gap: 5px;
            }
            #topBar .topbar-text {
                font-size: 10px;
            }
            #bottomBar {
                bottom: 6px;
                gap: 4px;
                padding: 5px 6px;
            }
            #bottomBar button {
                width: 32px;
                height: 32px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- 加载画面 -->
    <div id="loadingOverlay">
        <div class="loader-ring"></div>
        <div class="loader-text">正在初始化地图</div>
        <div class="loader-sub">加载天地图服务...</div>
    </div>

    <!-- 地图容器 -->
    <div id="mapContainer"></div>

    <!-- 脉冲定位标记层 -->
    <div id="pulseLayer">
        <div class="pulse-marker" id="pulseMarker" style="display:none;">
            <div class="pulse-core"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
            <div class="pulse-ring"></div>
        </div>
    </div>

    <!-- 顶部状态栏 -->
    <div id="topBar">
        <div class="status-dot locating" id="statusDot"></div>
        <span class="topbar-text" id="statusText">正在定位...</span>
        <span class="topbar-divider"></span>
        <span class="topbar-time" id="liveTime">00:00:00</span>
    </div>

    <!-- 左侧信息面板 -->
    <div id="infoPanel">
        <div class="panel-header">
            <div class="panel-icon">📍</div>
            <div>
                <div class="panel-title">位置信息</div>
                <div class="panel-subtitle">自动定位获取</div>
            </div>
        </div>
        <div class="info-row">
            <span class="info-icon">🌐</span>
            <div class="info-content">
                <div class="info-label">经度 / 纬度</div>
                <div class="info-value coords" id="infoCoords">获取中...</div>
            </div>
        </div>
        <div class="info-row">
            <span class="info-icon">🏠</span>
            <div class="info-content">
                <div class="info-label">详细地址</div>
                <div class="info-value address" id="infoAddress">正在解析地址...</div>
            </div>
        </div>
        <div class="info-row">
            <span class="info-icon">📍</span>
            <div class="info-content">
                <div class="info-label">省 / 市 / 区</div>
                <div class="info-value" id="infoRegion">获取中...</div>
            </div>
        </div>
        <div class="info-row">
            <span class="info-icon">🔍</span>
            <div class="info-content">
                <div class="info-label">当前缩放级别</div>
                <div class="info-value" id="infoZoom">--</div>
            </div>
        </div>
    </div>

    <!-- 底部操作栏 -->
    <div id="bottomBar">
        <button id="btnLocate" title="回到我的位置">
            🎯<span class="tooltip-hint">回到定位</span>
        </button>
        <button id="btnZoomIn" title="放大">
            ➕<span class="tooltip-hint">放大地图</span>
        </button>
        <button id="btnZoomOut" title="缩小">
            ➖<span class="tooltip-hint">缩小地图</span>
        </button>
        <button id="btnLayer" title="切换图层">
            🛰️<span class="tooltip-hint">切换图层</span>
        </button>
        <button id="btnRefresh" title="刷新定位">
            🔄<span class="tooltip-hint">刷新定位</span>
        </button>
    </div>

    <!-- 缩放级别标签 -->
    <div id="zoomLabel">缩放级别: --</div>

    <!-- Toast -->
    <div id="toast"></div>

    <!-- 天地图 JavaScript API -->
    <script src="https://api.tianditu.gov.cn/api?v=4.0&tk=5286044079362f6fb29825f460273939">
    </script>

    <script>
        (function() {
            // ==================== DOM 元素 ====================
            const mapContainer = document.getElementById('mapContainer');
            const pulseLayer = document.getElementById('pulseLayer');
            const pulseMarker = document.getElementById('pulseMarker');
            const loadingOverlay = document.getElementById('loadingOverlay');
            const statusDot = document.getElementById('statusDot');
            const statusText = document.getElementById('statusText');
            const liveTimeEl = document.getElementById('liveTime');
            const infoCoords = document.getElementById('infoCoords');
            const infoAddress = document.getElementById('infoAddress');
            const infoRegion = document.getElementById('infoRegion');
            const infoZoom = document.getElementById('infoZoom');
            const zoomLabel = document.getElementById('zoomLabel');
            const toast = document.getElementById('toast');
            const btnLocate = document.getElementById('btnLocate');
            const btnZoomIn = document.getElementById('btnZoomIn');
            const btnZoomOut = document.getElementById('btnZoomOut');
            const btnLayer = document.getElementById('btnLayer');
            const btnRefresh = document.getElementById('btnRefresh');

            // ==================== 全局状态 ====================
            let map = null;
            let userLngLat = null; // 用户定位的地理坐标 {lon, lat}
            let userMarker = null; // 天地图Marker
            let currentLayerType = 'normal'; // 'normal' | 'satellite' | 'hybrid'
            let isLocating = false;
            let pulseUpdateTimer = null;
            let toastTimer = null;

            // ==================== Toast ====================
            function showToast(message, type = '') {
                if (toastTimer) clearTimeout(toastTimer);
                toast.textContent = message;
                toast.className = 'show ' + type;
                toastTimer = setTimeout(() => {
                    toast.className = '';
                }, 2200);
            }

            // ==================== 更新时间 ====================
            function updateLiveTime() {
                const now = new Date();
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                liveTimeEl.textContent = `${h}:${m}:${s}`;
            }
            updateLiveTime();
            setInterval(updateLiveTime, 1000);

            // ==================== 逆地理编码 ====================
            async function reverseGeocode(lon, lat) {
                const postStr = JSON.stringify({ lon: lon, lat: lat, ver: 1 });
                const url =
                    `https://api.tianditu.gov.cn/geocoder?postStr=${encodeURIComponent(postStr)}&type=geocode&tk=5286044079362f6fb29825f460273939`;
                try {
                    const resp = await fetch(url, {
                        method: 'GET',
                        mode: 'cors',
                    });
                    if (!resp.ok) throw new Error('HTTP ' + resp.status);
                    const data = await resp.json();
                    if (data && data.status === '0' && data.result) {
                        const result = data.result;
                        const formattedAddress = result.formatted_address || '未知地址';
                        const comp = result.addressComponent || {};
                        const province = comp.province || '';
                        const city = comp.city || '';
                        const district = comp.district || '';
                        const regionStr = [province, city, district].filter(Boolean).join(' / ') || '未知区域';
                        return {
                            address: formattedAddress,
                            region: regionStr,
                            province,
                            city,
                            district,
                        };
                    } else {
                        return { address: '无法解析地址', region: '未知', province: '', city: '', district: '' };
                    }
                } catch (err) {
                    console.warn('逆地理编码失败:', err.message);
                    return { address: '地址解析服务暂不可用', region: '网络请求失败', province: '', city: '', district: '' };
                }
            }

            // ==================== 更新脉冲标记屏幕位置 ====================
            function updatePulsePosition() {
                if (!map || !userLngLat || !pulseMarker) return;
                try {
                    const lngLat = new T.LngLat(userLngLat.lon, userLngLat.lat);
                    const point = map.lngLatToContainerPoint(lngLat);
                    if (point && isFinite(point.x) && isFinite(point.y)) {
                        pulseMarker.style.left = point.x + 'px';
                        pulseMarker.style.top = point.y + 'px';
                        pulseMarker.style.display = 'block';
                    } else {
                        pulseMarker.style.display = 'none';
                    }
                } catch (e) {
                    // 如果lngLatToContainerPoint不可用，尝试使用容器中心
                    const rect = mapContainer.getBoundingClientRect();
                    pulseMarker.style.left = rect.width / 2 + 'px';
                    pulseMarker.style.top = rect.height / 2 + 'px';
                    pulseMarker.style.display = 'block';
                }
            }

            function startPulseUpdate() {
                stopPulseUpdate();
                updatePulsePosition();
                pulseUpdateTimer = setInterval(updatePulsePosition, 200);
            }

            function stopPulseUpdate() {
                if (pulseUpdateTimer) {
                    clearInterval(pulseUpdateTimer);
                    pulseUpdateTimer = null;
                }
            }

            // ==================== 更新信息面板 ====================
            async function updateInfoPanel(lon, lat) {
                infoCoords.textContent = `${lon.toFixed(6)}, ${lat.toFixed(6)}`;
                infoAddress.textContent = '正在解析地址...';
                infoRegion.textContent = '获取中...';
                const geo = await reverseGeocode(lon, lat);
                infoAddress.textContent = geo.address;
                infoRegion.textContent = geo.region;
            }

            function updateZoomInfo() {
                if (!map) return;
                try {
                    const zoom = map.getZoom();
                    const zoomRounded = Math.round(zoom * 10) / 10;
                    infoZoom.textContent = zoomRounded + ' 级';
                    zoomLabel.textContent = '缩放级别: ' + zoomRounded;
                } catch (e) {
                    infoZoom.textContent = '--';
                    zoomLabel.textContent = '缩放级别: --';
                }
            }

            // ==================== 设置用户位置 ====================
            async function setUserLocation(lon, lat, showToastMsg = true) {
                userLngLat = { lon, lat };
                const lngLat = new T.LngLat(lon, lat);

                // 移除旧标记
                if (userMarker && map) {
                    try { map.removeOverLay(userMarker); } catch (e) {}
                    userMarker = null;
                }

                // 创建自定义图标
                const iconSvg = `
                <svg xmlns="http://www.w3.org/2000/svg" width="42" height="56" viewBox="0 0 42 56">
                  <defs>
                    <filter id="shadow" x="-40%" y="-20%" width="180%" height="180%">
                      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
                    </filter>
                    <linearGradient id="pinGrad" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#ff6b6b"/>
                      <stop offset="100%" stop-color="#c0392b"/>
                    </linearGradient>
                    <radialGradient id="pinGlow" cx="50%" cy="30%" r="50%">
                      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
                      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
                    </radialGradient>
                  </defs>
                  <ellipse cx="21" cy="48" rx="12" ry="5" fill="rgba(0,0,0,0.25)" filter="url(#shadow)"/>
                  <path d="M21 0C9.4 0 0 8.8 0 19.6C0 34.3 21 56 21 56S42 34.3 42 19.6C42 8.8 32.6 0 21 0Z" fill="url(#pinGrad)" filter="url(#shadow)"/>
                  <circle cx="21" cy="19" r="10" fill="white" opacity="0.95"/>
                  <circle cx="21" cy="19" r="6" fill="#c0392b"/>
                  <circle cx="21" cy="19" r="3" fill="white" opacity="0.8"/>
                  <ellipse cx="21" cy="16" rx="4" ry="2.5" fill="url(#pinGlow)"/>
                </svg>`;
                const iconDataUri = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(iconSvg)));

                const icon = new T.Icon({
                    iconUrl: iconDataUri,
                    iconSize: new T.Point(42, 56),
                    iconAnchor: new T.Point(21, 54),
                });

                userMarker = new T.Marker(lngLat, { icon: icon, zIndex: 999 });
                if (map) {
                    map.addOverLay(userMarker);
                }

                // 更新脉冲
                updatePulsePosition();
                pulseMarker.style.display = 'block';
                startPulseUpdate();

                // 更新面板
                await updateInfoPanel(lon, lat);

                // 更新状态
                statusDot.className = 'status-dot';
                statusText.textContent = '已定位';

                if (showToastMsg) {
                    showToast('✅ 已定位到您的当前位置', 'success');
                }
            }

            // ==================== 执行定位 ====================
            function performLocate(showToastMsg = true) {
                if (isLocating) return;
                if (!navigator.geolocation) {
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '浏览器不支持定位';
                    showToast('⚠️ 浏览器不支持地理定位功能', 'warning');
                    // 默认北京
                    setUserLocation(116.397428, 39.90923, showToastMsg);
                    return;
                }
                isLocating = true;
                statusDot.className = 'status-dot locating';
                statusText.textContent = '正在定位...';
                if (showToastMsg) showToast('🔍 正在获取您的位置...', '');

                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const lon = position.coords.longitude;
                        const lat = position.coords.latitude;
                        isLocating = false;
                        await setUserLocation(lon, lat, showToastMsg);
                        // 地图定位
                        if (map) {
                            try {
                                map.centerAndZoom(new T.LngLat(lon, lat), 15);
                            } catch (e) {
                                map.setCenter(new T.LngLat(lon, lat));
                                map.setZoom(15);
                            }
                        }
                        updateZoomInfo();
                    },
                    async (error) => {
                        isLocating = false;
                        console.warn('定位失败:', error.message);
                        statusDot.className = 'status-dot error';
                        statusText.textContent = '定位失败，使用默认位置';
                        showToast('⚠️ 定位失败，已显示默认位置（北京）', 'warning');
                        const defaultLon = 116.397428;
                        const defaultLat = 39.90923;
                        await setUserLocation(defaultLon, defaultLat, false);
                        if (map) {
                            try {
                                map.centerAndZoom(new T.LngLat(defaultLon, defaultLat), 13);
                            } catch (e) {
                                map.setCenter(new T.LngLat(defaultLon, defaultLat));
                                map.setZoom(13);
                            }
                        }
                        updateZoomInfo();
                    }, {
                        enableHighAccuracy: true,
                        timeout: 12000,
                        maximumAge: 60000,
                    }
                );
            }

            // ==================== 初始化地图 ====================
            function initMap() {
                try {
                    map = new T.Map(mapContainer, {
                        center: new T.LngLat(116.397428, 39.90923),
                        zoom: 13,
                        minZoom: 3,
                        maxZoom: 18,
                    });

                    // 添加比例尺控件
                    const scaleControl = new T.Control.Scale({
                        position: T_ANCHOR_BOTTOM_LEFT,
                    });
                    map.addControl(scaleControl);

                    // 监听地图事件
                    map.addEventListener('moveend', function() {
                        updatePulsePosition();
                        updateZoomInfo();
                    });
                    map.addEventListener('zoomend', function() {
                        updatePulsePosition();
                        updateZoomInfo();
                    });
                    map.addEventListener('drag', function() {
                        updatePulsePosition();
                    });

                    // 初始缩放信息
                    updateZoomInfo();

                    // 隐藏加载画面
                    setTimeout(() => {
                        loadingOverlay.classList.add('hidden');
                    }, 600);

                    // 开始定位
                    setTimeout(() => {
                        performLocate(true);
                    }, 400);

                    return true;
                } catch (e) {
                    console.error('地图初始化失败:', e);
                    loadingOverlay.querySelector('.loader-text').textContent = '地图加载失败';
                    loadingOverlay.querySelector('.loader-sub').textContent = '请检查网络连接后刷新页面';
                    statusDot.className = 'status-dot error';
                    statusText.textContent = '地图初始化失败';
                    showToast('❌ 地图初始化失败，请刷新重试', 'warning');
                    return false;
                }
            }

            // ==================== 按钮事件 ====================
            btnLocate.addEventListener('click', () => {
                if (userLngLat && map) {
                    try {
                        map.centerAndZoom(new T.LngLat(userLngLat.lon, userLngLat.lat), 15);
                    } catch (e) {
                        map.setCenter(new T.LngLat(userLngLat.lon, userLngLat.lat));
                        map.setZoom(15);
                    }
                    updatePulsePosition();
                    updateZoomInfo();
                    showToast('🎯 已回到定位位置', 'success');
                } else {
                    performLocate(true);
                }
            });

            btnZoomIn.addEventListener('click', () => {
                if (!map) return;
                try {
                    const currentZoom = map.getZoom();
                    map.setZoom(Math.min(currentZoom + 1, 18));
                    updateZoomInfo();
                    updatePulsePosition();
                } catch (e) {}
            });

            btnZoomOut.addEventListener('click', () => {
                if (!map) return;
                try {
                    const currentZoom = map.getZoom();
                    map.setZoom(Math.max(currentZoom - 1, 3));
                    updateZoomInfo();
                    updatePulsePosition();
                } catch (e) {}
            });

            btnLayer.addEventListener('click', () => {
                if (!map) return;
                const layerCycle = ['normal', 'satellite', 'hybrid'];
                const currentIndex = layerCycle.indexOf(currentLayerType);
                const nextIndex = (currentIndex + 1) % layerCycle.length;
                currentLayerType = layerCycle[nextIndex];

                try {
                    // 天地图4.0 设置地图类型
                    if (currentLayerType === 'satellite') {
                        map.setMapType(TMAP_SATELLITE_MAP || 'satellite');
                        btnLayer.classList.add('active-btn');
                        showToast('🛰️ 已切换至卫星影像', 'success');
                    } else if (currentLayerType === 'hybrid') {
                        map.setMapType(TMAP_HYBRID_MAP || 'hybrid');
                        btnLayer.classList.add('active-btn');
                        showToast('🗺️ 已切换至混合地图', 'success');
                    } else {
                        map.setMapType(TMAP_NORMAL_MAP || 'normal');
                        btnLayer.classList.remove('active-btn');
                        showToast('🗺️ 已切换至矢量地图', 'success');
                    }
                } catch (e) {
                    console.warn('切换图层失败:', e);
                    showToast('⚠️ 图层切换暂不可用', 'warning');
                }
            });

            btnRefresh.addEventListener('click', () => {
                performLocate(true);
            });

            // ==================== 键盘快捷键 ====================
            document.addEventListener('keydown', function(e) {
                if (e.key === '+' || e.key === '=') {
                    e.preventDefault();
                    btnZoomIn.click();
                } else if (e.key === '-') {
                    e.preventDefault();
                    btnZoomOut.click();
                } else if (e.key === 'l' || e.key === 'L') {
                    e.preventDefault();
                    btnLocate.click();
                } else if (e.key === 'r' || e.key === 'R') {
                    e.preventDefault();
                    btnRefresh.click();
                }
            });

            // ==================== 窗口大小改变时更新脉冲 ====================
            let resizeDebounce = null;
            window.addEventListener('resize', () => {
                if (resizeDebounce) clearTimeout(resizeDebounce);
                resizeDebounce = setTimeout(() => {
                    updatePulsePosition();
                }, 300);
            });

            // ==================== 启动 ====================
            function bootstrap() {
                // 检查T对象是否可用
                if (typeof T !== 'undefined' && typeof T.Map === 'function') {
                    initMap();
                } else {
                    // 等待天地图脚本加载
                    let attempts = 0;
                    const checkInterval = setInterval(() => {
                        attempts++;
                        if (typeof T !== 'undefined' && typeof T.Map === 'function') {
                            clearInterval(checkInterval);
                            initMap();
                        } else if (attempts > 60) {
                            clearInterval(checkInterval);
                            loadingOverlay.querySelector('.loader-text').textContent = '天地图加载超时';
                            loadingOverlay.querySelector('.loader-sub').textContent =
                                '请检查网络连接后刷新页面';
                            statusDot.className = 'status-dot error';
                            statusText.textContent = 'API加载超时';
                            showToast('❌ 天地图API加载超时，请刷新重试', 'warning');
                        }
                    }, 500);
                }
            }

            // DOM加载完成后启动
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', bootstrap);
            } else {
                bootstrap();
            }

            // ==================== 页面卸载清理 ====================
            window.addEventListener('beforeunload', () => {
                stopPulseUpdate();
                if (toastTimer) clearTimeout(toastTimer);
            });

            console.log('%c🗺️ 天地图豪华定位地图 %c已就绪',
                'font-size:16px;font-weight:bold;color:#4da8ff;',
                'font-size:12px;color:#b0b8c4;');
            console.log('%c功能：自动定位 | 逆地理编码 | 脉冲标记 | 图层切换 | 快捷键',
                'font-size:11px;color:#888;');
            console.log('%c快捷键：+/- 缩放 | L 回到定位 | R 刷新定位',
                'font-size:11px;color:#666;');
        })();
    </script>
</body>
</html>
